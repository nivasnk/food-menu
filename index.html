<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaalvan Fish Hotel - Authentic Malvani Taste</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap');

  :root {
    --primary: #ff6b35;
    --secondary: #f7c59f;
    --dark: #1a1a2e;
    --card-bg: #ffffff;
    --text: #333;
    --muted: #888;
    --green: #25d366;
    --gold: #ffd700;
    --ocean: #006994;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a2e3f 0%, #0a3d4f 50%, #0a2e3f 100%);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Floating Fish Particles */
  .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute;
    font-size: 20px;
    animation: float linear infinite;
    opacity: 0.12;
  }
  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Language Toggle Button */
  .lang-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    font-family: 'Poppins', sans-serif;
  }
  .lang-toggle:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .lang-toggle.marathi {
    background: #ff6b35;
    color: white;
  }
  .lang-toggle.english {
    background: #006994;
    color: white;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    animation: slideDown 0.8s ease;
  }
  @keyframes slideDown {
    from { transform: translateY(-40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .logo-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #ff9a3c);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(255,107,53,0.5);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,107,53,0.4); }
    50% { box-shadow: 0 0 40px rgba(255,107,53,0.8); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  .tagline {
    color: var(--secondary);
    font-size: 0.95rem;
    font-weight: 300;
    margin-top: 0.3rem;
    letter-spacing: 1px;
  }
  .date-badge {
    display: inline-block;
    background: rgba(255,107,53,0.2);
    border: 1px solid rgba(255,107,53,0.4);
    color: var(--secondary);
    padding: 0.3rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    margin-top: 0.6rem;
    letter-spacing: 0.5px;
  }

  /* Announcement Banner - IMPROVED VISIBILITY */
  .announcement {
    max-width: 1200px;
    margin: 0 auto 1rem;
    background: linear-gradient(135deg, #ff6b35 0%, #ff8c4a 100%);
    border-radius: 12px;
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .announcement-icon {
    font-size: 1.5rem;
    background: rgba(255,255,255,0.2);
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .announcement-text {
    font-size: 0.9rem;
    color: #ffffff;
    line-height: 1.5;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .announcement-text strong {
    color: #fff9c4;
    font-weight: 700;
  }

  /* Nav Tabs */
  .nav-tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 1rem;
    position: relative;
    z-index: 10;
    animation: fadeIn 1s ease 0.3s both;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .tab-btn {
    padding: 0.5rem 1.2rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    border-radius: 25px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(255,107,53,0.4);
  }

  /* Menu Grid */
  .menu-section {
    display: none;
    padding: 0.5rem 1rem 1rem;
    position: relative;
    z-index: 10;
    animation: fadeInUp 0.5s ease;
  }
  .menu-section.active { display: block; }
  @keyframes fadeInUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .section-title {
    text-align: center;
    color: var(--secondary);
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    font-weight: 300;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .menu-card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    animation: cardPop 0.5s ease both;
  }
  .menu-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  @keyframes cardPop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .card-emoji {
    text-align: center;
    font-size: 3rem;
    padding: 1.2rem 1rem 0.5rem;
    background: linear-gradient(135deg, #fff8f0, #fff);
  }
  .card-body { padding: 0.8rem 1rem 1rem; }
  .card-name {
    font-weight: 600;
    font-size: 1rem;
    color: var(--dark);
    margin-bottom: 0.25rem;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.6rem;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .price {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
  }
  .badge {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    font-weight: 500;
  }
  .badge-veg { background: #e8f5e9; color: #2e7d32; }
  .badge-nonveg { background: #fce4ec; color: #c62828; }
  .badge-special { background: #fff8e1; color: #e65100; }
  
  .cart-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .qty-btn {
    background: var(--primary);
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: bold;
    transition: all 0.2s;
  }
  .qty-btn:hover {
    transform: scale(1.1);
    background: #ff8c4a;
  }
  .qty-display {
    font-weight: 600;
    min-width: 30px;
    text-align: center;
  }
  .add-to-cart-btn {
    background: var(--green);
    color: white;
    border: none;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .add-to-cart-btn:hover {
    transform: scale(1.05);
    background: #128C7E;
  }
  .sold-out { opacity: 0.5; pointer-events: none; }

  /* Cart Sidebar */
  .cart-sidebar {
    position: fixed;
    right: 0;
    top: 0;
    width: 380px;
    height: 100vh;
    background: white;
    box-shadow: -5px 0 30px rgba(0,0,0,0.3);
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .cart-sidebar.open {
    transform: translateX(0);
  }
  .cart-header {
    background: var(--primary);
    color: white;
    padding: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-header h3 {
    font-size: 1.2rem;
  }
  .close-cart {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
  }
  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem;
    border-bottom: 1px solid #eee;
    margin-bottom: 0.5rem;
  }
  .cart-item-info {
    flex: 1;
  }
  .cart-item-name {
    font-weight: 600;
    font-size: 0.9rem;
  }
  .cart-item-price {
    color: var(--primary);
    font-size: 0.8rem;
  }
  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .cart-qty-btn {
    background: #f0f0f0;
    border: none;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
  }
  .remove-item {
    background: #ff4444;
    color: white;
    border: none;
    padding: 0.2rem 0.5rem;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.7rem;
  }
  .cart-footer {
    padding: 1rem;
    border-top: 2px solid #eee;
    background: #f9f9f9;
  }
  .cart-total {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 1rem;
    text-align: center;
  }
  .checkout-btn {
    width: 100%;
    background: var(--green);
    color: white;
    border: none;
    padding: 0.8rem;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .checkout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(37,211,102,0.3);
  }
  .clear-cart-btn {
    width: 100%;
    background: #ff4444;
    color: white;
    border: none;
    padding: 0.5rem;
    border-radius: 10px;
    margin-top: 0.5rem;
    cursor: pointer;
  }
  
  .cart-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: all 0.2s;
    animation: bounce 2s ease infinite;
  }
  .cart-icon:hover {
    transform: scale(1.1);
  }
  .cart-icon span {
    color: white;
    font-size: 1.5rem;
  }
  .cart-count {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #ff4444;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    display: none;
  }
  .overlay.show {
    display: block;
  }

  .user-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 2rem;
    border-radius: 20px;
    z-index: 1001;
    width: 90%;
    max-width: 400px;
    display: none;
  }
  .user-modal.show {
    display: block;
  }
  .user-modal input, .user-modal textarea {
    width: 100%;
    padding: 0.5rem;
    margin: 0.5rem 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
  }
  .user-modal textarea {
    min-height: 80px;
  }
  .submit-order {
    background: var(--green);
    color: white;
    border: none;
    padding: 0.8rem;
    border-radius: 10px;
    width: 100%;
    margin-top: 1rem;
    cursor: pointer;
    font-weight: 600;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    position: relative;
    z-index: 10;
  }

  @media (max-width: 768px) {
    .cart-sidebar { width: 100%; }
    .menu-grid { grid-template-columns: 1fr; }
    .lang-toggle { top: 10px; right: 10px; padding: 0.4rem 1rem; font-size: 0.8rem; }
    .logo-ring { width: 70px; height: 70px; font-size: 2rem; }
    .announcement { padding: 0.6rem 1rem; }
    .announcement-icon { font-size: 1.2rem; width: 32px; height: 32px; }
    .announcement-text { font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<button class="lang-toggle english" id="langToggle" onclick="toggleLanguage()">🇮🇳 मराठी</button>

<header>
  <div class="logo-ring">🐟</div>
  <h1 id="hotel-name">Kaalvan Fish Hotel</h1>
  <p class="tagline" id="tagline">Where Real Malvani Taste Lives</p>
  <div class="date-badge" id="today-date"></div>
</header>

<div class="announcement" id="announcement"></div>

<div class="nav-tabs" id="nav-tabs"></div>

<div id="menu-container"></div>

<div class="cart-icon" onclick="toggleCart()">
  <span>🛒</span>
  <span class="cart-count" id="cart-count">0</span>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3 id="cart-title">Your Order 🛒</h3>
    <button class="close-cart" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <p style="text-align:center; color:#888;" id="cart-empty-msg">Cart is empty</p>
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span id="total-label">Total</span>: ₹<span id="cart-total">0</span></div>
    <button class="checkout-btn" id="checkout-btn" onclick="showUserModal()">📱 Proceed to WhatsApp Order</button>
    <button class="clear-cart-btn" id="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
  </div>
</div>

<div class="user-modal" id="user-modal">
  <h3 id="delivery-title">📋 Delivery Details</h3>
  <input type="text" id="user-name" placeholder="Your Name *" required>
  <input type="tel" id="user-phone" placeholder="Phone Number *" required>
  <input type="text" id="user-address" placeholder="Delivery Address *" required>
  <textarea id="user-notes" placeholder="Special instructions (optional)"></textarea>
  <button class="submit-order" id="send-order-btn" onclick="sendOrderToWhatsApp()">Send Order on WhatsApp</button>
  <button onclick="closeUserModal()" id="cancel-btn" style="margin-top:0.5rem; width:100%; padding:0.5rem; background:#ddd; border:none; border-radius:8px; cursor:pointer;">Cancel</button>
</div>

<footer>
  &copy; 2025 Kaalvan Fish Hotel &nbsp;·&nbsp; Authentic Malvani Taste &nbsp;·&nbsp; Fresh Seafood Daily
</footer>

<script>

let currentLang = 'en';
let cart = [];

// Load cart from localStorage
function loadCart() {
  const savedCart = localStorage.getItem('kaalvanCart');
  if (savedCart) {
    cart = JSON.parse(savedCart);
    updateCartUI();
  }
}

// Save cart
function saveCart() {
  localStorage.setItem('kaalvanCart', JSON.stringify(cart));
  updateCartUI();
}

// Add to cart
function addToCart(item, category) {
  const existingItem = cart.find(i => i.name_en === item.name_en);
  if (existingItem) {
    existingItem.quantity++;
  } else {
    cart.push({
      ...item,
      category: category,
      quantity: 1
    });
  }
  saveCart();
  showNotification(`${currentLang === 'en' ? item.name_en : item.name_mr} added to cart!`);
}

// Update quantity
function updateQuantity(itemNameEn, delta) {
  const item = cart.find(i => i.name_en === itemNameEn);
  if (item) {
    item.quantity += delta;
    if (item.quantity <= 0) {
      cart = cart.filter(i => i.name_en !== itemNameEn);
    }
    saveCart();
  }
}

// Remove item
function removeItem(itemNameEn) {
  cart = cart.filter(i => i.name_en !== itemNameEn);
  saveCart();
}

// Clear cart
function clearCart() {
  if (confirm(currentLang === 'en' ? 'Clear entire cart?' : 'संपूर्ण कार्ट रिकामी करायची?')) {
    cart = [];
    saveCart();
  }
}

// Update cart UI
function updateCartUI() {
  const cartItemsDiv = document.getElementById('cart-items');
  const cartCount = document.getElementById('cart-count');
  const cartTotalSpan = document.getElementById('cart-total');
  
  const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
  const total = cart.reduce((sum, item) => {
    const price = parseInt(item.price.replace('₹', ''));
    return sum + (price * item.quantity);
  }, 0);
  
  cartCount.textContent = totalItems;
  cartTotalSpan.textContent = total;
  
  if (cart.length === 0) {
    cartItemsDiv.innerHTML = `<p style="text-align:center; color:#888;">${translations[currentLang].cartEmpty}</p>`;
    return;
  }
  
  cartItemsDiv.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${currentLang === 'en' ? item.name_en : item.name_mr}</div>
        <div class="cart-item-price">${item.price}</div>
      </div>
      <div class="cart-item-controls">
        <button class="cart-qty-btn" onclick="updateQuantity('${item.name_en}', -1)">-</button>
        <span>${item.quantity}</span>
        <button class="cart-qty-btn" onclick="updateQuantity('${item.name_en}', 1)">+</button>
        <button class="remove-item" onclick="removeItem('${item.name_en}')">✕</button>
      </div>
    </div>
  `).join('');
}

// Show notification
function showNotification(msg) {
  const notification = document.createElement('div');
  notification.textContent = msg;
  notification.style.cssText = `
    position: fixed;
    bottom: 100px;
    right: 20px;
    background: var(--green);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    z-index: 1002;
    animation: fadeInUp 0.3s ease;
  `;
  document.body.appendChild(notification);
  setTimeout(() => notification.remove(), 2000);
}

// Toggle cart
function toggleCart() {
  document.getElementById('cart-sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeCart() {
  document.getElementById('cart-sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// Show user modal
function showUserModal() {
  if (cart.length === 0) {
    alert(currentLang === 'en' ? 'Your cart is empty! Add some items first.' : 'तुमचे कार्ट रिकामे आहे! कृपया काही पदार्थ घाला.');
    return;
  }
  closeCart();
  document.getElementById('user-modal').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function closeUserModal() {
  document.getElementById('user-modal').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

// Send order to WhatsApp
function sendOrderToWhatsApp() {
  const name = document.getElementById('user-name').value.trim();
  const phone = document.getElementById('user-phone').value.trim();
  const address = document.getElementById('user-address').value.trim();
  const notes = document.getElementById('user-notes').value.trim();
  
  if (!name || !phone || !address) {
    alert(currentLang === 'en' ? 'Please fill in all required fields' : 'कृपया सर्व आवश्यक माहिती भरा');
    return;
  }
  
  let orderDetails = `🍽️ *NEW ORDER - KAALVAN FISH HOTEL* 🍽️\n\n`;
  orderDetails += `*Customer Details:*\n`;
  orderDetails += `Name: ${name}\n`;
  orderDetails += `Phone: ${phone}\n`;
  orderDetails += `Address: ${address}\n`;
  if (notes) orderDetails += `Special Notes: ${notes}\n`;
  orderDetails += `\n*Order Items:*\n`;
  
  let total = 0;
  cart.forEach((item, index) => {
    const price = parseInt(item.price.replace('₹', ''));
    const itemTotal = price * item.quantity;
    total += itemTotal;
    const itemName = currentLang === 'en' ? item.name_en : item.name_mr;
    orderDetails += `${index + 1}. ${itemName} x ${item.quantity} = ₹${itemTotal}\n`;
  });
  
  orderDetails += `\n*Total Amount:* ₹${total}\n`;
  orderDetails += `\n⏰ Order Time: ${new Date().toLocaleString()}\n`;
  
  const encodedMessage = encodeURIComponent(orderDetails);
  const whatsappUrl = `https://wa.me/${MENU_CONFIG.OWNER_WHATSAPP}?text=${encodedMessage}`;
  
  window.open(whatsappUrl, '_blank');
  
  cart = [];
  saveCart();
  closeUserModal();
  
  alert(currentLang === 'en' ? 'Order sent! You will be redirected to WhatsApp.' : 'ऑर्डर पाठवली! तुम्ही व्हॉट्सअॅपवर रीडायरेक्ट व्हाल.');
}

// Render menu

  const tabsHtml = `
    <button class="tab-btn active" onclick="showTab('all', event)">${translations[currentLang].allItems}</button>
    ${categories.map(cat => `
      <button class="tab-btn" onclick="showTab('${cat.id}', event)">${currentLang === 'en' ? cat.label_en : cat.label_mr}</button>
    `).join('')}
  `;
  document.getElementById('nav-tabs').innerHTML = tabsHtml;
  
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  
  // Individual category sections

    const section = document.createElement('div');

    section.innerHTML = `
      <p class="section-title">${currentLang === 'en' ? cat.label_en : cat.label_mr}</p>
      <div class="menu-grid">
        ${MENU_CONFIG[cat.id].map(item => `
          <div class="menu-card ${!item.available ? 'sold-out' : ''}">
            <div class="card-emoji">${item.emoji}</div>
            <div class="card-body">
              <div class="card-name">${currentLang === 'en' ? item.name_en : item.name_mr}</div>
              <div class="card-desc">${currentLang === 'en' ? item.desc_en : item.desc_mr}</div>
              <div class="card-footer">
                <span class="price">${item.price}</span>
                <span class="badge badge-${item.special ? 'special' : item.type}">
                  ${item.special ? (currentLang === 'en' ? '⭐ Special' : '⭐ विशेष') : (item.type === 'veg' ? (currentLang === 'en' ? '🟢 Veg' : '🟢 शाकाहारी') : (currentLang === 'en' ? '🔴 Non-veg' : '🔴 मांसाहारी'))}
                </span>
              </div>
              ${item.available ? `
                <div class="cart-controls">
                  <button class="add-to-cart-btn" onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${cat.id}')">
                    🛒 ${translations[currentLang].addToCart}

                </div>
              ` : `<div style="text-align:center; color:#c62828; font-size:0.7rem; margin-top:0.5rem;">${translations[currentLang].soldOut}</div>`}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(section);
  });
  
  // All items section
  const allSection = document.createElement('div');
  allSection.className = 'menu-section active';
  allSection.id = 'sec-all';
  
  categories.forEach(cat => {
    allSection.innerHTML += `
      <p class="section-title">${currentLang === 'en' ? cat.label_en : cat.label_mr}</p>
      <div class="menu-grid">
        ${MENU_CONFIG[cat.id].map(item => `
          <div class="menu-card ${!item.available ? 'sold-out' : ''}">
            <div class="card-emoji">${item.emoji}</div>
            <div class="card-body">
              <div class="card-name">${currentLang === 'en' ? item.name_en : item.name_mr}</div>
              <div class="card-desc">${currentLang === 'en' ? item.desc_en : item.desc_mr}</div>
              <div class="card-footer">
                <span class="price">${item.price}</span>
                <span class="badge badge-${item.special ? 'special' : item.type}">
                  ${item.special ? (currentLang === 'en' ? '⭐ Special' : '⭐ विशेष') : (item.type === 'veg' ? (currentLang === 'en' ? '🟢 Veg' : '🟢 शाकाहारी') : (currentLang === 'en' ? '🔴 Non-veg' : '🔴 मांसाहारी'))}
                </span>
              </div>
              ${item.available ? `
                <div class="cart-controls">
                  <button class="add-to-cart-btn" onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${cat.id}')">
                    🛒 ${translations[currentLang].addToCart}

            </div>
          </div>

  });

function showTab(cat, event) {
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`sec-${cat}`).classList.add('active');
  if (event && event.target) event.target.classList.add('active');
}

// Particles
function spawnParticles() {
  const fishes = ['🐟','🐠','🐡','🦐','🦀','🐙'];
  const container = document.getElementById('particles');
  for(let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = fishes[Math.floor(Math.random() * fishes.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.fontSize = (14 + Math.random() * 14) + 'px';
    container.appendChild(p);
  }
}
